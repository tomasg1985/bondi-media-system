<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bondi Media Â· Recuperar ContraseÃąa</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* ==================================================
           ESTILOS DIRECTOS - SIN DEPENDENCIAS EXTERNAS
           ================================================== */
        
        :root {
            --deep-navy: #0f172a;
            --coral: #ff4d4d;
            --sky-blue: #2563eb;
            --gray-50: #f8fafc;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-300: #cbd5e1;
            --gray-400: #94a3b8;
            --gray-500: #64748b;
            --gray-600: #475569;
            --gray-700: #334155;
            --gray-800: #1e293b;
            --gray-900: #0f172a;
            --gradient-primary: linear-gradient(135deg, #ff4d4d, #2563eb);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--gray-100);
            padding: 20px;
        }

        .forgot-card {
            background: white;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            width: 100%;
            max-width: 440px;
            overflow: hidden;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .forgot-header {
            background: var(--deep-navy);
            padding: 40px 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .forgot-header::before {
            content: '';
            position: absolute;
            top: -30%;
            right: -20%;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(255, 77, 77, 0.2) 0%, transparent 70%);
            border-radius: 50%;
        }

        .forgot-header::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -20%;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(37, 99, 235, 0.2) 0%, transparent 70%);
            border-radius: 50%;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.1);
            padding: 12px 24px;
            border-radius: 60px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            position: relative;
            z-index: 1;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: var(--gradient-primary);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 16px;
        }

        .logo span {
            color: white;
            font-weight: 600;
            font-size: 16px;
        }

        .forgot-header h1 {
            color: white;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            position: relative;
            z-index: 1;
        }

        .forgot-header p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 15px;
            position: relative;
            z-index: 1;
        }

        .forgot-body {
            padding: 40px 30px;
            background: white;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            color: var(--gray-700);
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray-400);
            font-size: 16px;
        }

        .input-wrapper input {
            width: 100%;
            padding: 16px 16px 16px 48px;
            border: 2px solid var(--gray-200);
            border-radius: 16px;
            font-size: 15px;
            background: var(--gray-50);
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: var(--sky-blue);
            background: white;
        }

        .forgot-btn {
            width: 100%;
            padding: 16px;
            background: var(--gradient-primary);
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin: 20px 0;
            transition: all 0.3s;
        }

        .forgot-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 30px -10px rgba(255, 77, 77, 0.3);
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: var(--sky-blue);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .back-link a:hover {
            color: var(--coral);
        }

        .info-message {
            background: #dbeafe;
            border: 1px solid #bfdbfe;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 24px;
            color: #1e40af;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .info-message i {
            font-size: 20px;
            color: #2563eb;
        }

        .success-message {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            color: #155724;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            display: none;
        }

        .error-message {
            background: #fee2e2;
            border: 1px solid #fecaca;
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 20px;
            color: #dc2626;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            display: none;
        }

        .loading {
            opacity: 0.7;
            pointer-events: none;
            position: relative;
        }

        .loading::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            margin: -10px 0 0 -10px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .forgot-header {
                padding: 30px 20px;
            }
            .forgot-header h1 {
                font-size: 24px;
            }
            .forgot-body {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="forgot-card">
        <div class="forgot-header">
            <div class="logo">
                <div class="logo-icon"><i class="fas fa-bolt"></i></div>
                <span>Bondi Media</span>
            </div>
            <h1>ÂŋOlvidaste tu contraseÃąa?</h1>
            <p>Te enviaremos instrucciones para recuperarla</p>
        </div>

        <div class="forgot-body">
            <div class="info-message">
                <i class="fas fa-info-circle"></i>
                <div>Ingresa tu email y te enviaremos un enlace para restablecer tu contraseÃąa.</div>
            </div>

            <div id="successMessage" class="success-message">
                <i class="fas fa-check-circle"></i>
                <span>ÂĄEmail enviado! Revisa tu bandeja de entrada.</span>
            </div>
            
            <div id="errorMessage" class="error-message">
                <i class="fas fa-exclamation-circle"></i>
                <span></span>
            </div>

            <form id="forgotForm">
                <div class="form-group">
                    <label>Email registrado</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" placeholder="ej: usuario@bondi.com" value="demo@bondi.com" required>
                    </div>
                </div>

                <button type="submit" class="forgot-btn" id="forgotBtn">Enviar instrucciones</button>

                <div class="back-link">
                    <a href="login.html">
                        <i class="fas fa-arrow-left"></i>
                        Volver al inicio de sesiÃģn
                    </a>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ==================================================
        // FORGOT PASSWORD JS
        // ==================================================

        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('forgotForm');
            const email = document.getElementById('email');
            const forgotBtn = document.getElementById('forgotBtn');
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');

            form.addEventListener('submit', function(e) {
                e.preventDefault();
                
                const emailValue = email.value.trim();
                
                // Ocultar mensajes previos
                errorMessage.style.display = 'none';
                successMessage.style.display = 'none';
                
                // Validar email
                if (!emailValue) {
                    showError('Por favor ingresa tu email');
                    return;
                }
                
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(emailValue)) {
                    showError('Ingresa un email vÃĄlido');
                    return;
                }
                
                // Mostrar loading
                forgotBtn.classList.add('loading');
                forgotBtn.textContent = 'Enviando...';
                
                // Simular envÃ­o de email
                setTimeout(() => {
                    forgotBtn.classList.remove('loading');
                    
                    // Buscar si el email existe en usuarios registrados
                    const users = JSON.parse(localStorage.getItem('bondi-users') || '[]');
                    const existingUser = users.find(u => u.email === emailValue);
                    
                    if (existingUser) {
                        console.log('Email encontrado:', existingUser.email);
                        // Email existe, mostrar ÃĐxito
                        successMessage.style.display = 'flex';
                        forgotBtn.textContent = 'â Enviado!';
                        forgotBtn.style.background = 'linear-gradient(135deg, #10b981, #059669)';
                        
                        // AquÃ­ normalmente enviarÃ­as un email real
                        // Por ahora solo simulamos
                        
                        setTimeout(() => {
                            forgotBtn.textContent = 'Enviar instrucciones';
                            forgotBtn.style.background = 'linear-gradient(135deg, #ff4d4d, #2563eb)';
                        }, 3000);
                        
                    } else {
                        // Email no existe, mostrar error pero sin revelar informaciÃģn de seguridad
                        forgotBtn.textContent = 'Enviar instrucciones';
                        showError('Si el email existe, recibirÃĄs instrucciones');
                        
                        // Por seguridad, siempre mostramos el mismo mensaje
                        console.log('Email no encontrado en la base de datos');
                    }
                    
                    // Auto-ocultar mensaje de ÃĐxito despuÃĐs de 5 segundos
                    setTimeout(() => {
                        successMessage.style.display = 'none';
                    }, 5000);
                    
                }, 1500);
            });

            function showError(message) {
                errorMessage.querySelector('span').textContent = message;
                errorMessage.style.display = 'flex';
                
                setTimeout(() => {
                    errorMessage.style.display = 'none';
                }, 4000);
            }
        });
    </script>
</body>
</html>
