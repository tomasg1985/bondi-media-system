<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bondi Media · Iniciar Sesión</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <div class="logo">
                <div class="logo-icon"><i class="fas fa-bolt"></i></div>
                <span>Bondi Media</span>
            </div>
            <h1>¡Bienvenido!</h1>
            <p>Ingresa tus credenciales para continuar</p>
        </div>

        <div class="login-body">
            <!-- Mensaje de error -->
            <div id="errorMessage" class="error-message" style="display: none;">
                <i class="fas fa-exclamation-circle"></i>
                <span>Email o contraseña incorrectos</span>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" placeholder="ej: usuario@bondi.com" value="demo@bondi.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Contraseña</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="••••••••" value="bondi2026" required>
                        <button type="button" class="toggle-password" id="togglePasswordBtn">
                            <i class="fas fa-eye" id="toggleIcon"></i>
                        </button>
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="remember" checked>
                        <span>Recordarme</span>
                    </label>
                    <a href="forgot-password.html" id="forgotLink">¿Olvidaste tu contraseña?</a>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">Iniciar sesión</button>

                <div class="divider">
                    <span>o continúa con</span>
                </div>

                <button type="button" class="google-btn" id="googleBtn">
                    <i class="fab fa-google"></i>
                    Google
                </button>

                <div class="signup-link">
                    ¿No tienes una cuenta?
                    <a href="register.html" id="signupLink">Regístrate</a>
                </div>
            </form>
        </div>
    </div>

    <script src="js/auth/login.js"></script>
</body>
</html>
